  DIRECTOR = 'Director',
  MANAGER = 'Manager',
  ADMIN = 'Admin',
  CASHIER = 'Cashier',
  RPH_ADMIN = 'Admin RPH', // New Role
  PUBLIC = 'Public' // Not logged in
}

  id: string;
  name: string;
  role: Role;
  avatar?: string;
  outletId?: string;
  password?: string; // Added password field
}

export enum ProductCategory {
  PREMIUM = 'Daging Premium',
  OFFAL = 'Jeroan',
  BONE = 'Tulangan',
  FAT = 'Lemak/Gajih',
  OTHER = 'Lain-lain',
  PROMO = 'Daging Promo'
}

export interface Product {
  id: string;
  name: string;
  category: ProductCategory;
  price: number;
  stock: number;
  unit: string; // kg, pack
  minStock: number;
  image?: string; // Optional now
  description: string;
  batchNumber?: string;
  expiryDate?: string;
}

export interface CartItem extends Product {
  qty: number;
}

export interface Transaction {
  id: string;
  date: string;
  time?: string;
  subtotal: number;
  discount: number;
  tax: number;
  total: number;
  items: CartItem[];
  paymentMethod: 'Tunai' | 'QRIS' | 'Debit' | 'Transfer';
  status: 'Selesai' | 'Pending';
  customerName: string;
  customerType: 'Umum' | 'Tetap/VIP';
}

export type Division = 'RPH Subaru' | 'Kantor Admin' | 'Subaru Tamin' | 'Subaru Way Halim' | 'Bagian Umum';

export interface Employee {
  id: string;
  name: string;
  division: Division;
  position: string;
  status: 'Hadir' | 'Terlambat' | 'Absen' | 'Pulang';

const generateEmployees = (): Employee[] => {
  const employees: Employee[] = [];
  let idCounter = 1;

  const createEmp = (count: number, division: any, role: string, baseSalary: number) => {
    for (let i = 0; i < count; i++) {
        const rand = Math.random();
        let status: any = 'Hadir';
        let time = '07:' + Math.floor(Math.random() * 59).toString().padStart(2, '0') + ' AM';
        if (rand > 0.95) { status = 'Absen'; time = undefined; }
        else if (rand > 0.85) { status = 'Terlambat'; time = '08:' + Math.floor(Math.random() * 30).toString().padStart(2, '0') + ' AM'; }

        employees.push({
            id: \`EMP-\${1000 + idCounter++}\`,
            name: \`Karyawan \${division.split(' ')[1] || 'Umum'} \${i + 1}\`,
            division: division,
            position: role,
            status: status,
            checkInTime: time,
            baseSalary: baseSalary
        });
    }
  };

  // - RPH Subaru: 10 orang

  const [discountType, setDiscountType] = useState<'flat' | 'percent'>('flat');

    if (toastTimeoutRef.current) {
      clearTimeout(toastTimeoutRef.current);
    }

    toastTimeoutRef.current = window.setTimeout(() => {
      setToast(prev => ({ ...prev, show: false }));

  };

    if (product.stock === 0) return;
    setCart(prev => {
      const exist = prev.find(item => item.id === product.id);
      if (exist && exist.qty >= product.stock) {
        showToast('Stok tidak mencukupi!');
        return prev;
      }
      if (exist) {
        return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);

        const newQty = item.qty + delta;
        if (newQty <= 0) return item; 
        if (product && newQty > product.stock) {
             showToast('Stok Maksimal');
             return item;

            "components/LoginModal.tsx": `import React, { useState } from 'react';
import { X, User, Lock, ArrowRight } from 'lucide-react';
import { MOCK_USERS } from '../constants';
import { User as UserType } from '../types';

interface LoginModalProps {
  isOpen: boolean;
  onClose: () => void;
  onLogin: (user: UserType) => void;
}

const LoginModal: React.FC<LoginModalProps> = ({ isOpen, onClose, onLogin }) => {
  const [selectedUser, setSelectedUser] = useState<UserType | null>(null);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  if (!isOpen) return null;

  const handleSelectUser = (user: UserType) => {
    setSelectedUser(user);
    setPassword('');
    setError('');
  };

  const handleBack = () => {
    setSelectedUser(null);
    setPassword('');
    setError('');
  };

  const handleSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (selectedUser) {
      if (selectedUser.password === password) {
        onLogin(selectedUser);
        setSelectedUser(null);
        setPassword('');
      } else {
        setError('Password salah. Silakan coba lagi.');
      }
    }
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
      <div className="bg-[#1e1e1e] w-full max-w-md rounded-2xl border border-white/10 shadow-2xl overflow-hidden relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white">
          <X size={24} />
        </button>
        
        <div className="p-8 text-center border-b border-white/5">
          <div className="w-16 h-16 bg-brand-red/20 text-brand-red rounded-full flex items-center justify-center mx-auto mb-4">
             <User size={32} />
          </div>
          <h2 className="text-2xl font-serif font-bold text-white">System Access</h2>
          <p className="text-gray-400 text-sm mt-1">{selectedUser ? 'Enter Password' : 'Select a role to login'}</p>
        </div>

        <div className="p-4">
          {!selectedUser ? (
            <div className="space-y-2">
              {MOCK_USERS.map((user) => (
                <button
                  key={user.id}
                  onClick={() => handleSelectUser(user)}
                  className="w-full flex items-center gap-4 p-4 hover:bg-white/5 rounded-xl transition-all group border border-transparent hover:border-white/5 text-left"
                >
                  <img src={user.avatar} alt={user.name} className="w-10 h-10 rounded-full border border-gray-600" />
                  <div>
                    <p className="text-white font-medium group-hover:text-brand-red transition-colors">{user.role}</p>
                    <p className="text-xs text-gray-500">{user.name}</p>
                  </div>
                  <ArrowRight size={16} className="ml-auto opacity-0 group-hover:opacity-100 transition-opacity text-gray-500" />
                </button>
              ))}
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="flex items-center gap-4 p-3 bg-white/5 rounded-xl border border-white/10 mb-6">
                 <img src={selectedUser.avatar} alt={selectedUser.name} className="w-10 h-10 rounded-full" />
                 <div>
                    <p className="text-white font-medium">{selectedUser.name}</p>
                    <p className="text-xs text-brand-gold">{selectedUser.role}</p>
                 </div>
                 <button type="button" onClick={handleBack} className="ml-auto text-xs text-gray-400 hover:text-white underline">Change</button>
              </div>

              <div>
                <label className="block text-sm text-gray-400 mb-1">Password</label>
                <div className="relative">
                  <Lock size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" />
                  <input 
                    type="password" 
                    autoFocus
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full bg-black/50 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-white focus:border-brand-red outline-none"
                    placeholder="Enter password..."
                  />
                </div>
                {error && <p className="text-red-500 text-xs mt-2">{error}</p>}
              </div>
              
              <button 
                type="submit"
                className="w-full py-3 bg-brand-red text-white font-bold rounded-lg hover:bg-red-900 transition-colors"
              >
                Login to ERP
              </button>
            </form>
          )}
        </div>
        
        <div className="p-4 bg-[#121212] text-center">
          <p className="text-xs text-gray-600">Secure connection encrypted.</p>
        </div>
      </div>
    </div>
  );
};

export default LoginModal;`,

    const phoneRegex = /^[\d\+\-\(\)\s]{7,}$/;

            "App.tsx": `import React, { useState } from 'react';
import PublicLanding from './components/PublicLanding';
import AdminLayout from './components/AdminLayout';
import Dashboard from './components/Dashboard';
import Inventory from './components/Inventory';
import POS from './components/POS';
import Finance from './components/Finance';
import HR from './components/HR';
import Settings from './components/Settings';
import Stakeholders from './components/Stakeholders';
import LoginModal from './components/LoginModal';
import { User, Role } from './types';
import { StoreProvider } from './StoreContext';

function App() {
  const [user, setUser] = useState<User | null>(null);
  const [currentView, setCurrentView] = useState<string>('dashboard');
  const [isLoginOpen, setIsLoginOpen] = useState(false);

  const handleLogin = (selectedUser: User) => {
    setUser(selectedUser);
    setIsLoginOpen(false);
    
    // Set default view based on role
    if (selectedUser.role === Role.CASHIER) {
      setCurrentView('pos');
    } else {
      setCurrentView('dashboard');
    }
  };

  const handleLogout = () => {
    setUser(null);
    setCurrentView('dashboard');
  };

  // Render the appropriate internal component based on currentView state
  const renderView = () => {
    switch (currentView) {
      case 'dashboard': return <Dashboard />;
      case 'inventory': return <Inventory />;
      case 'pos': return <POS />;
      case 'finance': return <Finance />;
      case 'hr': return <HR />;
      case 'contacts': return <Stakeholders />;
      case 'settings': return <Settings />;
      default: return <Dashboard />;
    }
  };

  if (!user) {
    return (
      <>
        <PublicLanding onLoginClick={() => setIsLoginOpen(true)} />
        <LoginModal 
          isOpen={isLoginOpen} 
          onClose={() => setIsLoginOpen(false)} 
          onLogin={handleLogin} 
        />
      </>
    );
  }

  return (
    <StoreProvider>
      <AdminLayout 
        user={user} 
        onLogout={handleLogout}
        currentView={currentView}
        onNavigate={setCurrentView}
      >
        {renderView()}
      </AdminLayout>
    </StoreProvider>
  );
}

export default App;`,
            "StoreContext.tsx": `import React, { createContext, useContext, useState, ReactNode } from 'react';
import { MOCK_PRODUCTS, MOCK_TRANSACTIONS, MOCK_RECEIVABLES, MOCK_EXPENSES, MOCK_EMPLOYEE_FINANCIALS, MOCK_EMPLOYEES, MOCK_CATTLE_ORDERS } from './constants';
import { Product, Transaction, Receivable, CartItem, Expense, EmployeeFinancial, Employee, CattleOrder } from './types';

interface StoreContextType {
  products: Product[];
  transactions: Transaction[];
  receivables: Receivable[];
  expenses: Expense[];
  employees: Employee[];
  employeeFinancials: EmployeeFinancial[];
  cattleOrders: CattleOrder[];
  searchQuery: string; // Global Search State
  setProducts: React.Dispatch<React.SetStateAction<Product[]>>;
  addTransaction: (transaction: Transaction) => void;
  addExpense: (expense: Expense) => void;
  addEmployeeFinancial: (record: EmployeeFinancial) => void;
  addCattleOrder: (order: CattleOrder) => void;
  updateProductStock: (items: CartItem[]) => void;
  setSearchQuery: (query: string) => void; // Global Search Setter
}

const StoreContext = createContext<StoreContextType | undefined>(undefined);

export const StoreProvider: React.FC<{ children: ReactNode }> = ({ children }) => {
  const [products, setProducts] = useState<Product[]>(MOCK_PRODUCTS);
  const [transactions, setTransactions] = useState<Transaction[]>(MOCK_TRANSACTIONS);
  const [receivables, setReceivables] = useState<Receivable[]>(MOCK_RECEIVABLES);
  const [expenses, setExpenses] = useState<Expense[]>(MOCK_EXPENSES);
  const [employees, setEmployees] = useState<Employee[]>(MOCK_EMPLOYEES);
  const [employeeFinancials, setEmployeeFinancials] = useState<EmployeeFinancial[]>(MOCK_EMPLOYEE_FINANCIALS);
  const [cattleOrders, setCattleOrders] = useState<CattleOrder[]>(MOCK_CATTLE_ORDERS);
  
  // Initialize Global Search Query
  const [searchQuery, setSearchQuery] = useState('');

  const addTransaction = (transaction: Transaction) => {
    setTransactions(prev => [transaction, ...prev]);
  };

  const addExpense = (expense: Expense) => {
    setExpenses(prev => [expense, ...prev]);
  };

  const addEmployeeFinancial = (record: EmployeeFinancial) => {
    setEmployeeFinancials(prev => [record, ...prev]);
  }

  const addCattleOrder = (order: CattleOrder) => {
    setCattleOrders(prev => [order, ...prev]);
  }

  const updateProductStock = (items: CartItem[]) => {
    setProducts(prevProducts => 
      prevProducts.map(prod => {
        const cartItem = items.find(item => item.id === prod.id);
        if (cartItem) {
          return { ...prod, stock: Math.max(0, prod.stock - cartItem.qty) };
        }
        return prod;
      })
    );
  };

  return (
    <StoreContext.Provider value={{ 
        products, 
        transactions, 
        receivables, 
        expenses,
        employees,
        employeeFinancials,
        cattleOrders,
        searchQuery,
        setProducts, 
        addTransaction, 
        addExpense,
        addEmployeeFinancial,
        addCattleOrder,
        updateProductStock,
        setSearchQuery
    }}>
      {children}
    </StoreContext.Provider>
  );
};

export const useStore = () => {
  const context = useContext(StoreContext);
  if (context === undefined) {
    throw new Error('useStore must be used within a StoreProvider');
  }
  return context;
};`
